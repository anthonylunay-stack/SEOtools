<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #5b8dee;
      --accent2: #7c5be8;
      --text: #e8eaf6;
      --muted: #8890b5;
      --danger: #e05b5b;
      --success: #4ecca3;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 7px;
      font-size: .82rem;
      font-weight: 600;
      padding: 7px 14px;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-secondary{ background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger   { background: var(--danger); color: #fff; }
    button:hover  { opacity: .82; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px 0;
      flex-wrap: wrap;
    }
    .toolbar span { font-size: .85rem; color: var(--muted); flex: 1; }
    .toolbar select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: .82rem;
      cursor: pointer;
    }

    /* ── GRID ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 24px;
      padding: 20px 28px 40px;
    }

    /* ── CHART ITEM — no border, no card ── */
    .chart-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: transparent;
    }

    /* hover overlay for controls */
    .chart-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,.65) 0%, transparent 100%);
      opacity: 0;
      transition: opacity .2s;
      z-index: 10;
      pointer-events: none;
    }
    .chart-item:hover .chart-overlay { opacity: 1; pointer-events: auto; }

    .overlay-title {
      flex: 1;
      font-size: .82rem;
      font-weight: 600;
      color: #fff;
      background: transparent;
      border: none;
      outline: none;
      border-bottom: 1px solid transparent;
      padding: 2px 4px;
    }
    .overlay-title:focus { border-bottom-color: var(--accent); }
    .overlay-btn {
      padding: 4px 10px;
      font-size: .75rem;
      border-radius: 5px;
    }

    /* iframe — full width, no frame */
    .chart-item iframe {
      display: block;
      width: 100%;
      border: none;
      border-radius: 10px;
    }

    /* text content rendered directly */
    .chart-text {
      background: var(--surface);
      border-radius: 10px;
      padding: 24px 28px;
      font-size: .88rem;
      line-height: 1.75;
      color: var(--text);
      overflow-y: auto;
    }
    .chart-text h1, .chart-text h2, .chart-text h3 {
      color: var(--accent);
      margin: 1.2em 0 .4em;
      font-size: 1em;
      font-weight: 700;
    }
    .chart-text h1 { font-size: 1.15em; }
    .chart-text strong { color: #fff; }
    .chart-text em { color: var(--muted); font-style: normal; }
    .chart-text p { margin-bottom: .6em; }
    .chart-text ul, .chart-text ol { padding-left: 1.4em; margin-bottom: .6em; }
    .chart-text li { margin-bottom: .3em; }
    .chart-text hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
    .chart-text .loading { color: var(--muted); font-style: italic; }

    /* resize handle */
    .resize-handle {
      height: 7px;
      cursor: ns-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .2s;
    }
    .chart-item:hover .resize-handle { opacity: 1; }
    .resize-handle::after {
      content: '';
      width: 28px; height: 3px;
      border-radius: 2px;
      background: var(--muted);
    }

    /* ── ADD CARD ── */
    #add-card {
      border: 2px dashed var(--border);
      border-radius: 10px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: .88rem;
      font-weight: 600;
      transition: border-color .2s, color .2s;
    }
    #add-card:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 26px;
      width: min(500px, 94vw);
      display: flex; flex-direction: column; gap: 16px;
    }
    .modal h3 { font-size: 1rem; }
    .modal label { font-size: .82rem; font-weight: 600; display: block; margin-bottom: 5px; }
    .modal input {
      width: 100%; padding: 9px 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text); font-size: .88rem; outline: none;
      transition: border-color .15s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
    .help-box {
      background: rgba(91,141,238,.07);
      border: 1px solid rgba(91,141,238,.2);
      border-radius: 7px;
      padding: 10px 13px;
      font-size: .79rem; color: var(--muted); line-height: 1.65;
    }
    .help-box strong { color: var(--accent); }
    .help-box code {
      background: var(--surface2); padding: 1px 5px;
      border-radius: 3px; font-family: monospace; font-size: .77rem;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 22px; right: 22px;
      background: var(--success); color: #0f1117;
      font-size: .82rem; font-weight: 700;
      padding: 9px 16px; border-radius: 7px;
      opacity: 0; transition: opacity .3s;
      pointer-events: none; z-index: 300;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>📊 SEO Dashboard</h1>
  <div class="header-actions">
    <button class="btn-secondary" onclick="exportConfig()">Exporter</button>
    <button class="btn-secondary" onclick="importConfig()">Importer</button>
    <button class="btn-primary" onclick="openModal()">+ Ajouter</button>
  </div>
</header>

<div class="toolbar">
  <span id="chart-count"></span>
  <select id="layout-select" onchange="applyLayout(this.value)">
    <option value="2">2 colonnes</option>
    <option value="1">1 colonne</option>
    <option value="3">3 colonnes</option>
  </select>
</div>

<div id="grid">
  <div id="add-card" onclick="openModal()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
    </svg>
    Ajouter un graphique
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal" style="display:none">
  <div class="modal">
    <h3>Ajouter / modifier un graphique</h3>
    <div class="help-box">
      <strong>Sources supportées :</strong><br>
      • <strong>Google Drive</strong> : lien de partage <code>drive.google.com/open?id=...</code><br>
      • <strong>Google Doc</strong> : lien <code>docs.google.com/document/d/.../edit</code> → affiché en texte intégré<br>
      • <strong>Google Sheets</strong> : <code>Publier le graphique</code> → copier <code>iframe src</code>
    </div>
    <div>
      <label for="chart-url">URL</label>
      <input id="chart-url" type="url" placeholder="https://drive.google.com/open?id=..." />
    </div>
    <div>
      <label for="chart-title">Titre</label>
      <input id="chart-title" type="text" placeholder="Ex: Trafic organique mensuel" />
    </div>
    <div>
      <label for="chart-height">Hauteur (px)</label>
      <input id="chart-height" type="number" value="480" min="200" max="1200" step="40" />
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="addChart()">Enregistrer</button>
    </div>
  </div>
</div>

<input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(event)" />
<div id="toast"></div>

<script>
  // ── Hardcoded Drive charts ──
  const DRIVE_CHARTS = [
    { id: '1RxEsRzGpUS8BwW-NX26nUsm1lBasG-u3', title: 'Analyse SEO' },
    { id: '1ARr0Ea25rAgzdv43YB13gPNX3uCGLUYr', title: 'Graphique 2' },
    { id: '1jnXLPHxIKR1jifw25SUIZuGeB6Xghxcm', title: 'Graphique 3' },
    { id: '1iZgpiPC_MqmiE2NEfJTsIEoC-_Kbx4bx', title: 'Graphique 4' },
    { id: '1hSSlKa1nrDgVNTpKD9ti5SH75OK5hBo-',  title: 'Graphique 5' },
    { id: '1dy6XFOxCUJnrscX1kOYFYyD3GoVHlSia', title: 'Graphique 6' },
    { id: '1OJwrQMguKLw42ko2K2XJCaI7WEq_LGzx', title: 'Graphique 7' },
  ].map(c => ({
    id: c.id,
    url: `https://drive.google.com/file/d/${c.id}/preview`,
    title: c.title,
    height: 480,
  }));

  function loadCharts() {
    const saved = JSON.parse(localStorage.getItem('seo_dashboard_charts') || '[]');
    const savedMap = Object.fromEntries(saved.map(c => [c.id || c.url, c]));
    const driveIds = new Set(DRIVE_CHARTS.map(c => c.id));
    const base = DRIVE_CHARTS.map(c => ({ ...c, ...(savedMap[c.id] || {}) }));
    const extra = saved.filter(c => !(c.id && driveIds.has(c.id)));
    return [...base, ...extra];
  }

  let charts = loadCharts();

  function save() {
    localStorage.setItem('seo_dashboard_charts', JSON.stringify(charts));
    showToast('Sauvegardé');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ── URL helpers ──
  function toDriveEmbed(url) {
    const openM = url.match(/drive\.google\.com\/open\?.*id=([a-zA-Z0-9_-]+)/);
    if (openM) return `https://drive.google.com/file/d/${openM[1]}/preview`;
    const viewM = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (viewM) return `https://drive.google.com/file/d/${viewM[1]}/preview`;
    return url;
  }

  // Detect if a Drive URL points to a Google Doc (text) vs image/chart
  function isDocEmbed(url) {
    return url.includes('docs.google.com/document');
  }

  // Convert Google Doc edit/view URL to embeddable pub URL
  function toDocEmbed(url) {
    const idM = url.match(/\/document\/d\/([a-zA-Z0-9_-]+)/);
    if (idM) return `https://docs.google.com/document/d/${idM[1]}/pub?embedded=true`;
    return url;
  }

  // ── Render ──
  function render() {
    const grid = document.getElementById('grid');
    const addCard = document.getElementById('add-card');
    grid.querySelectorAll('.chart-item').forEach(el => el.remove());
    document.getElementById('chart-count').textContent = `${charts.length} graphique(s)`;

    charts.forEach((chart, i) => {
      const item = buildItem(chart, i);
      grid.insertBefore(item, addCard);
    });
  }

  function buildItem(chart, i) {
    const item = document.createElement('div');
    item.className = 'chart-item';
    item.dataset.index = i;

    const h = chart.height || 480;

    // Controls overlay
    const overlay = document.createElement('div');
    overlay.className = 'chart-overlay';
    overlay.innerHTML = `
      <input class="overlay-title" value="${escHtml(chart.title)}"
        onchange="updateTitle(${i}, this.value)" title="Renommer" />
      <button class="btn-secondary overlay-btn" onclick="editChart(${i})">Modifier</button>
      <button class="btn-danger overlay-btn" onclick="removeChart(${i})">✕</button>
    `;
    item.appendChild(overlay);

    // Content
    const url = chart.url || '';
    if (isDocEmbed(url)) {
      // Google Doc → iframe pub embedded
      const frame = document.createElement('iframe');
      frame.src = toDocEmbed(url);
      frame.style.cssText = `width:100%;height:${h}px;border-radius:10px;`;
      frame.setAttribute('loading', 'lazy');
      item.appendChild(frame);
    } else if (url) {
      const frame = document.createElement('iframe');
      frame.src = escHtml(url);
      frame.style.cssText = `width:100%;height:${h}px;border-radius:10px;`;
      frame.setAttribute('loading', 'lazy');
      frame.setAttribute('allowfullscreen', '');
      item.appendChild(frame);
    } else {
      const ph = document.createElement('div');
      ph.className = 'chart-text';
      ph.style.height = h + 'px';
      ph.innerHTML = `<p class="loading">Aucune URL configurée. <button class="btn-primary" onclick="editChart(${i})">Ajouter</button></p>`;
      item.appendChild(ph);
    }

    // Resize handle
    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    handle.title = 'Glisser pour redimensionner';
    handle.addEventListener('mousedown', startResize(i, item));
    item.appendChild(handle);

    return item;
  }

  function startResize(i, item) {
    return function(e) {
      e.preventDefault();
      const startY = e.clientY;
      const startH = charts[i].height || 480;
      const frame = item.querySelector('iframe, .chart-text');

      function onMove(ev) {
        const newH = Math.max(200, startH + (ev.clientY - startY));
        if (frame) frame.style.height = newH + 'px';
      }
      function onUp() {
        const newH = frame ? parseInt(frame.style.height) : startH;
        charts[i].height = newH;
        save();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    };
  }

  function updateTitle(i, val) { charts[i].title = val; save(); }

  function removeChart(i) {
    if (!confirm(`Supprimer "${charts[i].title}" ?`)) return;
    charts.splice(i, 1);
    save();
    render();
  }

  // ── Modal ──
  let editingIndex = null;

  function openModal(idx = null) {
    editingIndex = idx;
    const c = idx !== null ? charts[idx] : null;
    document.getElementById('chart-url').value   = c ? c.url   : '';
    document.getElementById('chart-title').value = c ? c.title : '';
    document.getElementById('chart-height').value = c ? (c.height || 480) : 480;
    document.getElementById('modal').style.display = 'flex';
    setTimeout(() => document.getElementById('chart-url').focus(), 50);
  }
  function editChart(i) { openModal(i); }
  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    editingIndex = null;
  }

  function addChart() {
    const rawUrl = document.getElementById('chart-url').value.trim();
    const title  = document.getElementById('chart-title').value.trim() || 'Graphique sans titre';
    const height = parseInt(document.getElementById('chart-height').value) || 480;
    if (!rawUrl) { alert('Veuillez saisir une URL.'); return; }
    const url = toDriveEmbed(rawUrl);
    const entry = { url, title, height };
    if (editingIndex !== null) charts[editingIndex] = entry;
    else charts.push(entry);
    save(); closeModal(); render();
  }

  // ── Layout ──
  function applyLayout(cols) {
    const minW = cols === '1' ? '100%' : cols === '3' ? '320px' : '480px';
    document.getElementById('grid').style.gridTemplateColumns =
      cols === '1' ? '1fr' : `repeat(auto-fill, minmax(${minW}, 1fr))`;
  }

  // ── Export / Import ──
  function exportConfig() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(charts, null, 2)], { type: 'application/json' }));
    a.download = 'seo_dashboard.json';
    a.click();
  }
  function importConfig() { document.getElementById('import-input').click(); }
  function handleImport(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error();
        charts = data; save(); render(); showToast('Configuration importée');
      } catch { alert('Fichier JSON invalide.'); }
    };
    r.readAsText(file);
    e.target.value = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
      .replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  render();
</script>
</body>
</html>
